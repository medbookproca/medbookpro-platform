name: CI
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
      - name: Record build metadata
        run: |
          echo "GIT_COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm release:check
      - run: pnpm build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset --local --yes
      - run: supabase test db

  e2e:
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - name: Upload Playwright reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            playwright-report/
            test-results/
          retention-days: 14
